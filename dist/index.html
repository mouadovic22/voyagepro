        <h2 style="font-size:1.5em;color:#1E3A5F;margin-top:2em">Guides de voyage populaires</h2>

        <h3 style="color:#2E5984">Itinéraire Paris</h3>
        <p>Paris, la Ville Lumière, séduit par ses musées d'exception (Louvre, musée d'Orsay), ses avenues haussmanniennes et la tour Eiffel. Notre itinéraire Paris inclut Montmartre, le Marais, la gastronomie française et les meilleurs hôtels pour chaque budget. Idéal d'avril à octobre.</p>

        <h3 style="color:#2E5984">Itinéraire Tokyo</h3>
        <p>Tokyo, fascinante mégapole, mêle temples millénaires et gratte-ciels ultramodernes. Notre programme Tokyo couvre Shibuya, le sanctuaire Meiji, le marché de Toyosu, Akihabara et les meilleurs restaurants de sushis. Inoubliable au printemps pour les cerisiers en fleurs.</p>

        <h3 style="color:#2E5984">Itinéraire Marrakech</h3>
        <p>Marrakech, ville impériale du Maroc, enchante par sa médina (UNESCO), la place Jemaa el-Fna et le jardin Majorelle. Notre itinéraire Marrakech inclut les souks, les riads traditionnels et des excursions dans le désert ou l'Atlas. Meilleure période : printemps et automne.</p>

        <h3 style="color:#2E5984">Itinéraire Dubaï</h3>
        <p>Dubaï impressionne avec le Burj Khalifa, ses îles artificielles et ses centres commerciaux géants. Notre programme Dubaï propose safari dans les dunes, plages, restaurants étoilés et shopping. Visitez de novembre à mars pour éviter la chaleur.</p>

        <h3 style="color:#2E5984">Itinéraire Bali</h3>
        <p>Bali, paradis tropical, conjugue rizières en terrasses, temples sacrés et plages de rêve. Notre itinéraire Bali couvre Ubud, Canggu, le temple Tanah Lot et les meilleurs spas balinais. Séjournez idéalement d'avril à octobre (saison sèche).</p>
